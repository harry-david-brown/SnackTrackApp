services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: snacktrack-postgres
    environment:
      POSTGRES_DB: snacktrack_dev
      POSTGRES_USER: snacktrack
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snacktrack -d snacktrack_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend - points to the separate snack-track project
  api:
    build:
      context: /home/harry/Projects/snack-track
      dockerfile: Dockerfile.dev
    container_name: snacktrack-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://snacktrack:password@postgres:5432/snacktrack_dev
      GMAIL_CLIENT_ID: 340572988877-8g7j3mqdpa4l69drsjr9r7sscu49j1n7.apps.googleusercontent.com
      GMAIL_CLIENT_SECRET: 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
      GMAIL_REDIRECT_URI: http://localhost:3000/auth/callback
      GMAIL_REFRESH_TOKEN: 1//05uMl2jXPkTkMCgYIARAAGAUSNwF-L9IrS3JQyKkHDSceLQPRudCJHfd-n3A7lIhT69uKZVbN0dbNIVD2XnXP7vuoTZW7S7qXlxI
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /home/harry/Projects/snack-track:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev


volumes:
  postgres_data:

networks:
  default:
    name: snacktrack-network